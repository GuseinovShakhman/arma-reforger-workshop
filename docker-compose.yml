version: "3.9"

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    volumes:
      - db_data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/workshop.db
    restart: always
    networks:
      - internal

  # ── Playwright scraper ──────────────────────────────────────────────────
  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    env_file: .env
    volumes:
      - db_data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/workshop.db
    depends_on:
      - api
    restart: always
    networks:
      - internal

  # ── Nginx reverse proxy + static file server ─────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: always
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
    driver: bridge
